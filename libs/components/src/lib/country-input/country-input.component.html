@if (loadFailed()) {
  <ion-item color="danger" lines="none">
    <ion-label class="ion-text-wrap">
      Couldn't load the list of countries. Check your connection and try again.
    </ion-label>
    <ion-button slot="end" fill="clear" (click)="retry()">Retry</ion-button>
  </ion-item>
}

@if (mode === "dropdown") {
  <ion-item class="sneat-tiny-end-padding" lines="none">
    <ion-select
      interface="popover"
      [label]="label"
      [(ngModel)]="countryID"
      (ionChange)="onCountryChanged()"
    >
      <ion-select-option value="">Any</ion-select-option>
      @for (c of countries(); track c.id) {
        <ion-select-option [value]="c.id">
          {{ c.title }} {{ c.emoji }}
        </ion-select-option>
      }
    </ion-select>
    @if (countryID && canReset) {
      <ion-buttons slot="end">
        <ion-button color="medium" (click)="reset($event)">
          <ion-icon name="close-outline" />
        </ion-button>
      </ion-buttons>
    }
  </ion-item>
} @else {
  <!-- 'list' mode: inline searchable list while empty, collapses to a dropdown
       once a country is picked (sneat-select-from-list). -->
  <sneat-select-from-list
    [value]="countryID"
    [isFilterable]="true"
    [filterLabel]="label"
    [label]="label"
    [items]="countries()"
    (valueChange)="onListValueChanged($event)"
    [filterItem]="filterCountryByCode"
  />
}
