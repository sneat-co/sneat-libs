<ion-card>
  <ion-item>
    <ion-label>
      <ion-card-title color="medium">Spaces</ion-card-title>
    </ion-label>
    <ion-buttons slot="end" (click)="startAddingSpace()">
      @if (!showAdd()) {
        <ion-button color="primary">
          <ion-icon name="add" slot="start" />
          <ion-label>Add</ion-label>
        </ion-button>
      }
    </ion-buttons>
  </ion-item>
  @if (spaceContexts(); as spaceContexts) {
    <ion-list>
      <sneat-spaces-list
        [userID]="currentUserID"
        [spaces]="spaceContexts"
        [allowLeave]="true"
      />
    </ion-list>
  } @else {
    <ion-list>
      <ion-item>
        <ion-spinner name="" slot="start" color="medium" />
        <ion-buttons slot="start">
          <ion-button disabled="disabled" style="text-transform: none"
            >{{ loadingState() }}...
          </ion-button>
        </ion-buttons>
        <ion-skeleton-text animated />
      </ion-item>
    </ion-list>
  }

  @if (showAdd()) {
    <ion-item [disabled]="adding()">
      <ion-input
        (keyup.enter)="addSpace()"
        #addTeamInput
        [ngModel]="spaceName()"
        (ngModelChange)="spaceName.set($event)"
        (keyup.escape)="cancelAdd()"
        placeholder="New team name"
      />
      <ion-buttons slot="end">
        <ion-button color="primary" fill="solid" (click)="addSpace()">
          <ion-label>Create</ion-label>
        </ion-button>
        @if (!!spaces()?.length) {
          <ion-button (click)="cancelAdd()" color="medium" title="Cancel">
            @if (adding()) {
              <ion-spinner />
            } @else {
              <ion-icon name="close-outline" />
            }
          </ion-button>
        }
      </ion-buttons>
    </ion-item>
  }
  @if (showAdd()) {
    <ion-card-content>
      <p>Enter team name and click "Create" button to add a new team.</p>
    </ion-card-content>
  }
</ion-card>
