name: Release
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm nx run-many -t build --all
      - name: Configure git identity for release commit
        run: |
          git config --global user.email "ci@sneat.co"
          git config --global user.name "Sneat CI"
      - name: Release (first-release if no version tags exist yet)
        run: |
          if git tag --list "v*" | grep -q .; then
            pnpm nx release --yes
          else
            pnpm nx release --yes --first-release
          fi
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
