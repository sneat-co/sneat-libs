name: Release
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm nx run-many -t build --all
      - name: Configure git identity for release commit
        run: |
          git config --global user.email "ci@sneat.co"
          git config --global user.name "Sneat CI"
      - name: Bump versions, changelog, commit and push tags
        run: pnpm nx release --skip-publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish packages to npm
        run: pnpm nx release publish --yes --excludeTaskDependencies
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
