name: Publish

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref (branch or tag) to publish from (default - the default branch)
        required: false
        default: ""

jobs:
  publish:
    uses: sneat-co/cicd/.github/workflows/npm-publish.yml@main
    with:
      working-directory: .
      ref: ${{ inputs.ref }}
      build-command: pnpm nx run-many -t build --all
      publish-command: pnpm nx release publish
    secrets: inherit
