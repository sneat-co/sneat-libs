name: Publish extension to npm

# Publishes a Sneat niche-app extension library (e.g. @sneat/extension-eventus,
# @sneat/extension-listus, @sneat/extension-assetus) to npm using THIS repo's
# NPM_TOKEN.
#
# Why here: the niche-app repos (sneat-co/eventus, /listus, /assetus, …) don't
# carry npm publish credentials, but sneat-libs does (it publishes the whole
# @sneat/* scope). This workflow checks out the target repo, builds the given Nx
# library, and runs `nx release publish` for it with sneat-libs' NPM_TOKEN.
#
# Private source repos: the default GITHUB_TOKEN can only read sneat-libs, so a
# PRIVATE target (e.g. sneat-co/requoter) needs the SNEAT_CI_READWRITE_TOKEN
# secret — the ecosystem-wide fine-grained CI PAT (Contents R/W, all sneat-co
# repos). Public targets don't need it (checkout falls back to the default token
# when the secret is unset).
#
# Reusable across repos via inputs — run on demand ("Run workflow"):
#   repository: sneat-co/eventus   project: ext-eventus
#   repository: sneat-co/listus    project: ext-listus
#   repository: sneat-co/assetus   project: ext-assetus
#
# Plain (non-Nx) packages: some contract repos (e.g. sneat-co/<ext>-ext) ship the
# published lib as a plain pnpm package (package.json + src), not an Nx project.
# For those set plain=true and package-directory=<dir with package.json>; the
# workflow then runs `pnpm publish` there instead of nx build / nx release:
#   repository: sneat-co/sneat-team-ext   plain: true   package-directory: frontend
on:
  workflow_dispatch:
    inputs:
      repository:
        description: Source repo to publish from (owner/name)
        required: true
        default: sneat-co/eventus
      project:
        description: Nx project (library) to build & publish (Nx mode only)
        required: false
        default: ext-eventus
      ref:
        description: Git ref (branch or tag) to publish from
        required: false
        default: main
      working-directory:
        description: Nx workspace directory within the repo (Nx mode)
        required: false
        default: frontend
      plain:
        description: "Publish a plain (non-Nx) pnpm package with `pnpm publish` instead of nx"
        required: false
        default: "false"
      package-directory:
        description: "Plain mode: path to the package dir (containing package.json)"
        required: false
        default: frontend
      pnpm-version:
        description: pnpm major version
        required: false
        default: "11"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ${{ inputs.repository }}@${{ inputs.ref }}
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}
          fetch-depth: 0
          # PRIVATE source repos (e.g. sneat-co/requoter) can't be checked out with
          # this repo's default GITHUB_TOKEN — it's scoped to sneat-libs only. Set
          # the ecosystem SNEAT_CI_READWRITE_TOKEN secret (fine-grained PAT, all
          # sneat-co repos) on this repo to publish a private-source extension.
          # Public repos need nothing: the expression falls back to the default
          # token when the secret is unset.
          token: ${{ secrets.SNEAT_CI_READWRITE_TOKEN || github.token }}
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ inputs.pnpm-version }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      # --- Nx mode (default) ---
      - name: Install deps (Nx)
        if: inputs.plain != 'true'
        working-directory: ${{ inputs.working-directory }}
        run: pnpm install --frozen-lockfile
      - name: Build ${{ inputs.project }}
        if: inputs.plain != 'true'
        working-directory: ${{ inputs.working-directory }}
        run: pnpm nx build ${{ inputs.project }}
      - name: Publish ${{ inputs.project }} (nx release)
        if: inputs.plain != 'true'
        working-directory: ${{ inputs.working-directory }}
        run: pnpm nx release publish --projects=${{ inputs.project }}
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      # --- Plain (non-Nx) mode ---
      - name: Install deps (plain)
        if: inputs.plain == 'true'
        working-directory: ${{ inputs.package-directory }}
        # --ignore-scripts: a source-only contract package doesn't need its
        # devDeps' build scripts; skipping them avoids pnpm's ERR_PNPM_IGNORED_BUILDS
        # non-zero exit (e.g. esbuild) in CI.
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Publish plain package (pnpm publish)
        if: inputs.plain == 'true'
        working-directory: ${{ inputs.package-directory }}
        run: pnpm publish --no-git-checks --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
